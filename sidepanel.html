<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Navigator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="panel-only theme-dark">
  <div id="panel">
    <!-- Top toolbar: view tabs + collapse -->
    <div class="toolbar">
      <div class="tabs" role="tablist">
        <button id="tab-folders" class="tab active" role="tab" title="Carpetas">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        </button>
        <button id="tab-outline" class="tab" role="tab" title="Índice del documento">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="14" y2="18"/></svg>
        </button>
        <button id="tab-search" class="tab" role="tab" title="Buscar en el documento">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
      </div>
      <button id="collapse" class="icon-btn" title="Colapsar panel">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>
      </button>
    </div>

    <!-- View: FOLDERS -->
    <section id="view-folders" class="view active">
      <div class="view-header">
        <button id="pick-folder" class="primary-btn" title="Elegir carpeta" autofocus>
          📂 Abrir carpeta
        </button>
        <input id="folder-search" class="search-input" type="search" placeholder="Buscar archivos..." />
      </div>
      <nav id="tree" class="tree" aria-label="Árbol de archivos">
        <div class="empty-state">
          <p>👋 Bienvenido</p>
          <small>Pulsa <strong>Abrir carpeta</strong> para empezar.</small>
        </div>
      </nav>
    </section>

    <!-- View: OUTLINE -->
    <section id="view-outline" class="view">
      <div class="view-header">
        <input id="outline-search" class="search-input" type="search" placeholder="Filtrar índice..." />
      </div>
      <div id="outline" class="outline">
        <div class="empty-state">
          <p>📑 Sin documento</p>
          <small>Abre un <code>.md</code> desde la pestaña de carpetas.</small>
        </div>
      </div>
    </section>

    <!-- View: SEARCH IN DOCUMENT -->
    <section id="view-search" class="view">
      <div class="view-header">
        <input id="doc-search" class="search-input" type="search" placeholder="Buscar en el documento actual..." />
      </div>
      <div id="search-results" class="search-results">
        <div class="empty-state">
          <p>🔍 Sin resultados</p>
          <small>Escribe algo para buscar dentro del documento abierto.</small>
        </div>
      </div>
    </section>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
