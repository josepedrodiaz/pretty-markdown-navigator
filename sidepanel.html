<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Navigator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="panel-only theme-dark">
  <div id="panel">
    <!-- Top toolbar: view tabs + collapse -->
    <div class="toolbar">
      <div class="tabs" role="tablist">
        <button id="tab-folders" class="tab active" role="tab" title="Folders">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        </button>
        <button id="tab-outline" class="tab" role="tab" title="Document outline">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="14" y2="18"/></svg>
        </button>
        <button id="tab-search" class="tab" role="tab" title="Search in document">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
      </div>
      <button id="collapse" class="icon-btn" title="Collapse panel">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>
      </button>
    </div>

    <!-- View: FOLDERS -->
    <section id="view-folders" class="view active">
      <div class="view-header">
        <button id="pick-folder" class="primary-btn" title="Pick a folder" autofocus>
          📂 Open folder
        </button>
        <input id="folder-search" class="search-input" type="search" placeholder="Search files..." />
      </div>
      <nav id="tree" class="tree" aria-label="File tree">
        <div class="empty-state">
          <p>👋 Welcome</p>
          <small>Click <strong>Open folder</strong> to get started.</small>
        </div>
      </nav>
    </section>

    <!-- View: OUTLINE -->
    <section id="view-outline" class="view">
      <div class="view-header">
        <input id="outline-search" class="search-input" type="search" placeholder="Filter outline..." />
      </div>
      <div id="outline" class="outline">
        <div class="empty-state">
          <p>📑 No document</p>
          <small>Open a <code>.md</code> file from the folders tab.</small>
        </div>
      </div>
    </section>

    <!-- View: SEARCH IN DOCUMENT -->
    <section id="view-search" class="view">
      <div class="view-header">
        <input id="doc-search" class="search-input" type="search" placeholder="Search in current document..." />
      </div>
      <div id="search-results" class="search-results">
        <div class="empty-state">
          <p>🔍 No results</p>
          <small>Type something to search inside the open document.</small>
        </div>
      </div>
    </section>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
